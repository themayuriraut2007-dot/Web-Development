
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

<body>

    <h1>Time Table</h1>

    <table border="2">
        <!-- header -->
        <thead>
            <tr>
                <th> Days </th>
                <th>1</th>
                <th>2</th>
                <th>3</th>
                <th>4</th>
            </tr>
                <tr>
                <th> TIME </th>
                <th>10.15-11.15</th>
                <th>11.15-12.15</th>
                <th>12.15-1.15</th>
                <th>2.00-3.00</th>
            </tr>
        </thead>

        <!-- body -->
        <tbody>
            <tr>
                <th> MON </th>
                <td> DAA </td>
                <td> ST </td>
                <td> DL </td>
                <td> MDM </td>
            </tr>
            <tr>
                <th>TUES</th>
                <td>ML</td>
                <td>DL</td>
                <td>DAA</td>
                <td>MDM</td>
            </tr>
            <tr>
                <th>WED</th>
                <td>AI</td>
                <td>DAA</td>
                <td>ML</td>
                <td>ST</td>
            </tr>
            <tr>
                <th>THUS</th>
                <td>ML</td>
                <td>AI</td>
                <td>DL</td>
                <td>DAA</td>
            </tr>
            <tr>
                <th>FRI</th>
                <td>ML</td>
                <td>DL</td>
                <td>TCP</td>
                <td>DAA</td>
            </tr>
                
        </tbody>

        <!-- footer -->
        <tfoot>
            <tr>
                <th>SAT</th>
                <th colspan="5">TECHNICAL</th>
            </tr>
        </tfoot>
    </table>

    <!-- tr -> table row -->
    <!-- td/th -> table data/table heading -->

</body>

</html>
