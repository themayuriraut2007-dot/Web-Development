<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!-- flex is a single dimensional layout -->

    <style>
        * {
            margin: 0;
            padding: 0;
        }

        .parent {
            width: 620px;
            height: 600px;
            border: 5px solid black;
            margin: 0 auto;
            display: flex;

            /* flex properties */
            flex-direction: row;
            /* row column row-reverse column-reverse */
            gap: 10px;
            /* unit value */

            justify-content: center;
            /* for horizontal alignment */
            /* start end center space-between space-evenly space-around */

            align-items: center;
            /* for vertical alignment */
            /* start end center stretch*/

            /* if direction is row then justify-contnet will do horizontal alignment and align-items do vertical alignment else if direction is column then justify-content will do vertical alignment and aling-items do horizontal alignment*/

            flex-wrap: wrap;
            /* no-wrap wrap */
        }

        .child {
            width: 200px;
            height: 200px;
            background-color: red;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .parent2 {
            width: 800px;
            height: 600px;
            border: 2px solid black;
            margin: 100px auto;
            display: flex;
            gap: 10px;
        }

        /* grow */

        .c1 {
            order: 1;
        }

        .c9 {
            order: 2;
        }


        .container {
            width: 100%;
            height: 300px;
            border: 2px solid black;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .items{
            width: 200px;
            height: 200px;
            background-color: violet;
            color:white;
            
            font-size: 2rem;
            flex-grow: 1;
            
        }

    </style>

</head>

<body>
    

    <div class="container">
        <div class="items i1">i1</div>
        <div class="items i2">i2</div>
        <div class="items i3">i3</div>
        <div class="items i4">i4</div>
       
         <div class="items i5">i5</div>
        <div class="items i6">i6</div>
        <div class="items i7">i7</div>
         
    </div>

</body>

</html>
