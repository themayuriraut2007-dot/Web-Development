<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            height: 300vh;
        }

        #i1h2 {
            position: relative;
            bottom: -500px;
            left: 170px;
        }

        #i1 {
            width: 900px;
            height: 1000px;

            color: orange;
            background-image: url(./abc.jpg);
            /* background-color: red; */
            /* background-size: cover; */
            /* background-size: contain; */
            background-size: cover;
            background-position: right;
            background-repeat: no repeat-x;
            background-attachment: scroll;
            background: rgb(235, 201, 156, );
            
            /* background shorthand property */
            /* The background property in CSS is a shorthand property used to set all
            background-related properties in one line. */
            background: url(./abc.jpg) no-repeat right scroll rgba(206, 132, 34, 1) repeat-x fixed top;
            
            /* gradient background */
            /* background: linear-gradient(90deg, rgba(235, 201, 156, 0.2), rgba(22, 148, 66, 0.7));
             /* */
             /* background : conic-gradient(from 90deg at 50% 50%, rgba(235, 201, 156, 0.2), rgba(22, 148, 66, 0.7) );  */
             background: radial-gradient(circle at 20% 50%, rgba(235, 201, 156, 0), rgba(22, 148, 66, 0.5) );

        }
    </style>
</head>

<body>
    <div id="i1">
        <h2 id="i1h2"><u>captain levi</u></h2>
        <center>
<h1 style="color: red;" class="levi"><u>Nature</u></h1>
</center>

<img src="./abc.jpg" alt="Nature" width="500px" height="400px" style="background-position: center ;">

    </div>
</body>

</html>
