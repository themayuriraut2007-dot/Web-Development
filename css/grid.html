<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        .parent {
            width: 900px;
            height: 900px;
            border: 20px dashed black;
            margin: 30rem auto;
            display: grid;
            grid-template-columns: 300px 300px 300px;
            grid-template-rows: 300px 300px 300px;
            gap:.4rem;
            justify-items: center;
            align-items: stretch;
            /* we also use in above -> start,stretch,center */
        
           
        }

        .child {
            background-color: rgb(93, 0, 255);
            color: rgb(29, 234, 52);
            font-size: 3rem;
            font-weight: bolder;
            font-style:italic;
            
            
            /* width: 100px;
            height: 100px; */
        }

        .child1 {
            
            grid-row: 1 / 4;
        }
        .child2{
            grid-row: 1/3;
        }
        
        
       
       
    </style>


</head>

<body>
    <div class="parent">
        <div class="child child1">child1</div>
        <div class="child child2">child2</div>
        <div class="child child3">child3</div>
        <div class="child child4">child4</div>
        <div class="child child5">child5</div>
        <div class="child child6">child6</div>
        
    </div>
</body>

</html>
