<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        
        .parent {
            width: 600px;
            height: 600px;
            border:2px solid black;
            margin: 200px auto;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            padding-left:90px;
            padding-top: 30px;
            background-color: rgba(242, 242, 106, 0.47);
            border-radius:20px;
            
           
        }

        .key {
            height:90px;
            width: 90px;
            background: linear-gradient(rgba(128, 128, 128, 0.5), white, rgba(128, 128, 128, 0.5));
            display: grid;
            justify-content: center;
            align-items: center;
            background-color: aqua;
            font-size: 1.5rem;
            font-weight: bold;
            color: black;
          
        }
        
        

        .key:hover{
            background-color: black;
        }

    </style>

</head>

<body>

    <div class="parent">
        <div class="key key-1">1</div>
        <div class="key key-2">2</div>
        <div class="key key-3">3</div>
        <div class="key key-4">4</div>
        <div class="key key-5">5</div>
        <div class="key key-6">6</div>
        <div class="key key-7">7</div>
        <div class="key key-8">8</div>
        <div class="key key-9">9</div>
        <div class="key key-%">%</div>
        <div class="key key-0">0</div>
        <div class="key key-*">*</div>
    </div>


    </div>
</body>

</html>
