<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        * {
            margin: 0;
            padding: 0;
        } 

        .item1 {
            position:absolute;
            width: 300px;
            height: 400px;
            background-color: blue;
            
            top: 100px;
            left: 300px;
           
            z-index: 8;
        }
        
        .item2{
            width:400px;
            height:400px;
            background-color: rgb(65, 217, 241);
            position:relative;
            z-index: 6;
        
            
        }
        .item3{
            position:relative;
            width:400px;
            height:400px;
            background-color: coral;
            left:100px;
            bottom:60px;
            z-index: 9;
            
        }
        
    </style>

</head>

<body>
        <div class="item1">
            <h1>Box 2</h1>
        </div>
        
        <div class="item2"> 
            <h1>Box 1</h1>
        </div>
        <div class="item3"> 
            <h1>Box 3</h1>
        </div>
    
</body>

</html>
