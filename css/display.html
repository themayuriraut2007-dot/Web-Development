<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>


        #i1 {
            width: 700px;
            height: 700px;
            background-color:pink;
            display: inline-block;
        }

        #i2 {
            width: 700px;
            height: 700px;
            background-color: green;
            display: inline-block;
        }
        #i3{
            width:600px;
            height:600px;
            background-color: brown;
            display:inline-block;

        }
        #i4{
            height:600px;
            width:600px;
            background-color: chocolate;
            display:inline-block;

        }
        #i5{
            width:500px;
            height:500px;
            background: red;
            display:block;
        }





         /* inline -> continues in the same line but does not supports external height and width */

        /* block -> will not be in the same line but supports external height and width */

        /* inline-block -> will allow elements to be in the same line and also support external height and width */

    </style>

</head>

<body>
    <div id="i1">
        <h1>
        <span>pink</span>
        </h1>
    </div>
    <div id="i2">
        <h1><span>green</span></h1>
        
    </div>
    <div id="i3">
        <h1>
            <span>brown</span>
        </h1>
    </div>
    
    <div id="i4">
        <h1>
            <span>choclate</span>
        </h1>
    </div>
    <div id="i5"></div>
</body>

</html>
