<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Jio Hotstar Clone</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #0f1014;
      color: white;
    }

    /* Navbar */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 30px;
      background-color: #14161d;
      border-bottom: 1px solid #2a2c35;
    }

    .logo {
      font-size: 50px;
      font-weight: bold;
      color: #00bfff;
    }

    .nav-links a {
      margin-left: 20px;
      text-decoration: none;
      color: #ccc;
      font-size: 14px;
    }

    .nav-links a:hover {
      color: white;
    }

    /* Hero Section */
    .hero {
      position: relative;
      height: 400px;
      background:no-repeat center/cover;
      display: flex;
      align-items: center;
      padding: 40px;
    }

    .hero-content {
      max-width: 500px;
    }

    .hero h1 {
      font-size: 40px;
      margin-bottom: 10px;
    }

    .hero p {
      font-size: 16px;
      margin-bottom: 20px;
      color: #ddd;
    }

    .btn {
      padding: 10px 20px;
      border: none;
      background-color: #1f80e0;
      color: white;
      font-size: 14px;
      border-radius: 5px;
      cursor: pointer;
    }

    /* Section */
    .section {
      padding: 20px 30px;
    }

    .section h2 {
      margin-bottom: 15px;
    }

    /* Card Row */
    .card-row {
      display: flex;
      gap: 15px;
    }

    .card {
      width: 180px;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid #2a2c35;
      transition: transform 0.3s;
    }

    .card img {
      width: 100%;
      height: 250px;
      object-fit: cover;
    }

    .card:hover {
      transform: scale(1.05);
    }

    /* Footer */
    .footer {
      text-align: center;
      padding: 20px;
      margin-top: 20px;
      border-top: 1px solid #2a2c35;
      font-size: 14px;
      color: #888;
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <div class="navbar">
    <div class="logo">JioHotstar</div>
    <div class="nav-links">
      <a href="#">Home</a>
      <a href="#">TV</a>
      <a href="#">Movies</a>
      <a href="#">Sports</a>
    </div>
  </div>

  <!-- Hero Section -->
  <div class="hero">
    <div class="hero-content">
      <h1>Watch Your Favorite Shows</h1>
      <p>Stream unlimited movies, TV shows, and live sports anytime, anywhere.</p>
      <button class="btn">Subscribe Now</button>
    </div>
  </div>
