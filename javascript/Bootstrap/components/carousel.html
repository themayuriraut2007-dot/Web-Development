    <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <title>Bootstrap Accordion</title>
</head>
<body>

<div class="container mt-5">
    <h2 class="text-center mb-4">Frequently Asked Questions</h2>

    <div class="accordion" id="myAccordion">

        <!-- Accordion Item 1 -->

        <div class="accordion-item">
            <h2 class="accordion-header">
                <button class="accordion-button" type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#collapseOne">
                    What is Bootstrap?
                </button>
            </h2>

            <div id="collapseOne"
                class="accordion-collapse collapse show"
                data-bs-parent="#myAccordion">

                <div class="accordion-body">
                    Bootstrap is a CSS framework used to create responsive websites quickly.
                </div>
            </div>
        </div>

        <!-- Accordion Item 2 -->

        <div class="accordion-item">
            <h2 class="accordion-header">
                <button class="accordion-button collapsed" type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#collapseTwo">
                    What is Accordion?
                </button>
            </h2>

            <div id="collapseTwo"
                class="accordion-collapse collapse"
                data-bs-parent="#myAccordion">

                <div class="accordion-body">
                    Accordion is used to show and hide content by clicking on a heading.
                </div>
            </div>
        </div>

        <!-- Accordion Item 3 -->
         
        <div class="accordion-item">
            <h2 class="accordion-header">
                <button class="accordion-button collapsed" type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#collapseThree">
                    Why do we use Bootstrap?
                </button>
            </h2>

            <div id="collapseThree"
                class="accordion-collapse collapse"
                data-bs-parent="#myAccordion">

                <div class="accordion-body">
                    Bootstrap helps create responsive and attractive websites with less code.
                </div>
            </div>
        </div>

    </div>
</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
</body>
</html>
