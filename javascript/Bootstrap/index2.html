<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Practice</title>
<!-- 
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"> -->

    
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM"
          crossorigin="anonymous">

    <style>
        #parent{
            height:300px;
            background-color:black;
        }

        .box{
            height:80px;
            width:80px;
        }
    </style>
</head>
<body>

    <div id="parent" class="d-flex justify-content-center align-items-center gap-3">

        <div class="box bg-danger"></div>

        <div class="box bg-warning flex-grow-1"></div>

        <div class="box bg-success"></div>

    </div>

    <br>

    <div class="bg-primary text-white p-3 mt-4 ms-4 d-inline-block">
        Bootstrap Box
    </div>

    <br><br>

    <p class="text-center">
        <span class="text-danger fs-1 fw-bold">
            Hello Bootstrap
        </span>
    </p>

    <p class="text-center">
        <span class="text-success fst-italic">
            Welcome to Bootstrap
        </span>
    </p>



</body>
</html>
